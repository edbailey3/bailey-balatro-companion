<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balatro Tactical Companion - v1 Parallel Chasing Matrix</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <header>
    <h1>Balatro Tactical Companion</h1>
    <p class="subtitle">v1 Parallel Hypergeometric Draw Engine</p>
  </header>

  <main class="app-container">
    <!-- LEFT PANEL: INVENTORY CONFIGURATION MATRIX -->
    <section class="panel">
      <h2 class="panel-title">Deck Inventory & Hand Dock</h2>
      
      <!-- 13x4 Grid Matrix Container -->
      <div class="matrix-container">
        <p class="target-menu-label">Active Deck counts (13 Ranks × 4 Suits)</p>
        <div id="matrix-grid" class="matrix-grid">
          <!-- Dynamically populated via JS -->
        </div>
      </div>

      <!-- Current Hand Dock (up to 8 cards) -->
      <div class="hand-dock-container">
        <p class="target-menu-label">Hand Dock (Select cards to Discard)</p>
        <div id="hand-dock" class="hand-dock">
          <!-- Dynamically populated via JS -->
        </div>
      </div>

      <!-- Actions Layout -->
      <div class="actions-container">
        <button id="reset-btn" class="action-btn reset-btn">
          <span>🔄</span> Reset to Standard 52-Card Deck
        </button>
        <button id="clear-btn" class="action-btn clear-btn">
          <span>🗑️</span> Clear Deck & Hand
        </button>
      </div>
    </section>

    <!-- RIGHT PANEL: COMPUTATION PANEL (CHASING MATRIX) -->
    <section class="panel">
      <h2 class="panel-title comp-title">Outs Analysis & Chasing Matrix</h2>

      <!-- Target Options Header -->
      <div class="config-toggle-header">
        <span class="switch-label">Target Auto-Detection</span>
        <button id="auto-detect-toggle" class="switch-btn active">ON</button>
      </div>

      <!-- Chasing Matrix stack of 12 parallel hand types -->
      <div class="matrix-container">
        <p class="target-menu-label">Parallel Draw Probabilities (P(X &ge; k))</p>
        <div id="chasing-matrix" class="chasing-matrix">
          <!-- Dynamically populated via JS -->
        </div>
      </div>

      <!-- Global Telemetry & Status bar -->
      <div class="global-telemetry-bar">
        <div class="global-telemetry-stats">
          <div class="global-telemetry-stat">
            <label>N:</label>
            <span id="global-telemetry-N">0</span>
          </div>
          <div class="global-telemetry-stat">
            <label>n:</label>
            <span id="global-telemetry-n">0</span>
          </div>
        </div>
        <div class="global-status">
          <span class="status-label">Engine:</span>
          <span id="engine-status-text" class="status-text">CALCULATING</span>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
